
services:
  ### POSTRGES BBDD
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Sin puerto expuesto al host: la BBDD sólo es accesible desde otros
    # contenedores en la red interna de Docker (servicio `db`, puerto 5432).
    # Para conectarse desde el host usa: docker compose exec db psql -U $POSTGRES_USER -d $POSTGRES_DB
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  ###BACKEND
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    #ports:
     # - "3000:3000"
    env_file:
       - backend/.env
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "./scripts/docker-start-dev.sh"]
  

  ### FRONTEND 
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    #ports:
     # - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
    - frontend/.env
    depends_on:
      - backend

  ### NGINX
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:
