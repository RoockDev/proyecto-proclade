server {
  listen 80;
  server_name _;

  # Tamaño máximo de uploads (alineado con los límites del backend: PDFs hasta 10MB)
  client_max_body_size 20m;

  # ─── Cabeceras de seguridad (aplican siempre, incluso en respuestas de error) ───
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), gyroscope=(), magnetometer=(), accelerometer=(), payment=(), interest-cohort=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-src 'self' https://www.google.com https://maps.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

  # ─── Bloqueo de archivos y rutas sensibles ───
  location = /.env { return 404; }
  location ~* ^/\.git { return 404; }
  location ~* ^/\.ht { return 404; }

  # Bloquear ficheros ocultos (excepto /.well-known/ por si se usa para ACME u otros)
  location ~ /\.(?!well-known\/).* { return 404; }

  # Bloquear backups y temporales comunes
  location ~* (\.bak$|\.old$|~$) { return 404; }

  # ─── Uploads: servidos directamente por Nginx desde el volumen compartido ───
  # El backend escribe en /app/uploads (volumen `uploads_data`). Aquí lo
  # montamos como /var/www/uploads:ro para que Nginx lo sirva sin pasar
  # cada request por NestJS (mucho más eficiente).
  location /uploads/ {
    alias /var/www/uploads/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # ─── BACKEND API (NestJS) ───
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── SOCKET.IO (WebSocket + long-polling) ───
  location /socket.io/ {
    proxy_pass http://backend:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600;
  }

  # ─── Assets del build de Vite (cache largo: tienen hash en el nombre) ───
  location /assets/ {
    root /usr/share/nginx/html;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ─── SPA: servir index.html con fallback para rutas del router ───
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;

    # No cachear el index.html (para que los despliegues se reflejen al instante)
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
      add_header X-Content-Type-Options nosniff always;
      add_header X-Frame-Options SAMEORIGIN always;
      add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
  }
}
