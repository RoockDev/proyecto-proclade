# ──────────────────────────────────────────────
# HTTP → HTTPS redirección permanente (puerto 80)
# ──────────────────────────────────────────────
server {
  listen 80;

  # Excepción: mantener disponible .well-known (ACME/challenges)
  location ^~ /.well-known/ {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Todo lo demás → 301 a HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ──────────────────────────────────────────────
# HTTPS (puerto 443)
# ──────────────────────────────────────────────
server {
  listen 443 ssl;

  ssl_certificate     /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # Cabeceras de seguridad HTTP aplicadas siempre para respuestas exitosas y de error
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), gyroscope=(), magnetometer=(), accelerometer=(), payment=(), interest-cohort=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # Permitir los assets de Vite (.vite y /node_modules/.vite) que el servidor de desarrollo genera sobre el mismo host
  location ^~ /.vite/ {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location ^~ /node_modules/.vite/ {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Bloqueo explícito de archivos y rutas sensibles
  location = /.env {
    return 404;
  }

  location ~* ^/\.git {
    return 404;
  }

  location ~* ^/\.ht {
    return 404;
  }

  # Bloquear otros archivos ocultos (excepto .well-known por regla superior)
  location ~ /\.(?!well-known\/).* {
    return 404;
  }

  # Bloquear copias de seguridad y archivos temporales comunes
  location ~* (\.bak$|\.old$|~$) {
    return 404;
  }

  # FRONTEND (Vite)
  location / {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    # HMR Vite
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 3600;
  }

  # BACKEND API (Nest)
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # SOCKET.IO (WebSocket + long-polling)
  location /socket.io/ {
    proxy_pass http://backend:3000/socket.io/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_set_header Host $host;
  }
}
